<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="container">
        
        <div class="header">
            <span>Cadastrar Cliente</span>
            <button onclick="openModal()" id="add">Adicionar</button>

        </div>

        <div class="table">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Contato</th>
                        <th>E-mail</th>
                        <th class="acao">Editar</th>
                        <th class="acao">Excluir</th>
                    </tr>
                </thead>
                <tbody>

                </tbody>
            </table>
        </div>

        <div class="modal-container">
            <div class="modal">
                <form>
                    <label for="m-nome">Nome</label>
                    <input type="text" id="m-nome" required>

                    <label for="m-numero">Telefone</label>
                    <input type="text" id="m-numero" required>

                    <label for="m-email">E-mail</label>
                    <input type="text" id="m-email" required>
                    <button id="btnSalvar">Salvar</button>
                </form>
            </div>
        </div>



    </div>
<script src="script.js"></script>
</body>
</html>
